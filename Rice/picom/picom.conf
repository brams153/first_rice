#################################
#             Backend           #
#################################
backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;
glx-no-rebind-pixmap = true;
use-damage = false; # Crítico para que el blur no deje rastro al mover ventanas

#################################
#            Shadows            #
#################################
shadow = true;
shadow-radius = 20;
shadow-offset-x = -15;
shadow-offset-y = -15;
shadow-opacity = 0.6;

shadow-exclude = [
    "_GTK_FRAME_EXTENTS",
    "class_g = 'Cairo-clock'",
    "class_g = 'Cairo-dock'",
    "class_g = 'firefox' && window_type = 'utility'",
    "name = 'Notification'",
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

#################################
#            Fading              #
#################################
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-delta = 6;
fade-exclude = [];

#################################
#            Opacity             #
#################################
inactive-opacity = 0.85;
active-opacity = 0.95;
frame-opacity = 0.8;
inactive-opacity-override = false;

# Reglas de transparencia por aplicación
opacity-rule = [
    "85:class_g = 'kitty'",
    "85:class_g = 'code-oss'",
    "80:class_g = 'Rofi'",
    "90:class_g = 'Polybar'"
];

#################################
#             Blur              #
#################################
blur: {
  method = "dual_kawase";
  strength = 7;
};

# Las opciones de fondo se declaran fuera del bloque principal en versiones modernas
blur-background = true;
blur-background-frame = false;
blur-background-fixed = false;

blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Peek'",
    "_GTK_FRAME_EXTENTS"
];

#################################
#        Esquinas (Corners)     #
#################################
corner-radius = 12;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
#        General Settings       #
#################################
dbus = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
#refresh-rate = 0;
vsync = true;
detect-transient = true;
detect-client-leader = true;

wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.85; focus = true; full-shadow = false; };
  dock = { shadow = true; clip-shadow-above = true; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.95; };
  dropdown_menu = { opacity = 0.95; };
  dialog = { blur-background = true; };
  unknown = { blur-background = true; };
};
